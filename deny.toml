# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Allow the permissive licenses common in the Rust ecosystem. The project
# itself is Apache-2.0.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
