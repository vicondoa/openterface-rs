# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2024-0436: `paste` is unmaintained (author archived it). It is a
    # build-time-only proc-macro pulled transitively via the wgpu/winit tree
    # (not a runtime dependency) and carries no security vulnerability — only an
    # "unmaintained" notice. No supported drop-in replacement is wired through
    # our upstreams yet, so we accept it until wgpu migrates off it.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Allow the permissive licenses common in the Rust ecosystem. The project
# itself is Apache-2.0. MPL-2.0 is allowed for the `serialport` dependency
# (file-level weak copyleft; using it as an unmodified library dependency does
# not affect openterface-rs's own Apache-2.0 licensing).
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace path dependencies (e.g. the test-support dev-dependency) have
# no version requirement; that is not a real wildcard-version risk.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
