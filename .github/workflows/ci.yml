name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev libv4l-dev \
            libwayland-dev libxkbcommon-dev \
            clang libclang-dev

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (hardware backends)
        run: |
          cargo clippy -p openterface-core --features serial-backend,video-backend --lib -- -D warnings
          cargo clippy -p openterface-cli --features hardware --all-targets -- -D warnings
          cargo clippy -p openterface-gui --features display --all-targets -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test (no hardware)
        run: cargo nextest run --workspace

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  gpu-render:
    name: headless render (lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install software Vulkan + windowing libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers vulkan-tools \
            libwayland-dev libxkbcommon-dev
      - name: Headless render test (software adapter)
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
          WGPU_BACKEND: vulkan
        run: cargo test -p openterface-gui --features gpu-tests --test headless_render -- --nocapture
