name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev libv4l-dev \
            libwayland-dev libxkbcommon-dev \
            clang libclang-dev

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (hardware backends)
        run: |
          cargo clippy -p openterface-core --features serial-backend,video-backend --lib -- -D warnings
          cargo clippy -p openterface-cli --features hardware --all-targets -- -D warnings
          cargo clippy -p openterface-gui --features display --all-targets -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@e616db6d3d80e86d787ef4a5373e3a4b74c50db2
        with:
          tool: nextest

      - name: Test (no hardware)
        run: cargo nextest run --workspace

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe
        with:
          command: check advisories bans licenses sources

  gpu-render:
    name: headless render (lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
      - name: Install software Vulkan + windowing libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers vulkan-tools libvulkan1 \
            libwayland-dev libxkbcommon-dev
      - name: Locate lavapipe ICD and verify it loads
        run: |
          set -x
          ls -la /usr/share/vulkan/icd.d/ || true
          dpkg -L mesa-vulkan-drivers | grep -iE 'icd|lvp|libvulkan_lvp' || true
          LVP="$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)"
          if [ -z "$LVP" ]; then
            echo "::error::No lavapipe ICD found under /usr/share/vulkan/icd.d/"
            exit 1
          fi
          echo "VK_ICD_FILENAMES=$LVP" >> "$GITHUB_ENV"
          # Diagnostic only: confirm the loader can see lavapipe.
          VK_ICD_FILENAMES="$LVP" vulkaninfo --summary 2>&1 | head -40 || true
      - name: Headless render test (software adapter)
        env:
          WGPU_BACKEND: vulkan
          OPENTERFACE_REQUIRE_GPU: "1"
        run: cargo test -p openterface-gui --features gpu-tests --test headless_render -- --nocapture
