name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt / clippy / test (no system libs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      # NOTE: deliberately NO apt system libraries here. The default workspace
      # build/test must pass with no udev/v4l/Wayland/Vulkan installed — that is
      # the project's no-hardware, no-system-lib guarantee.
      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test (no hardware)
        run: cargo nextest run --workspace

      - name: Doctests (nextest does not run these)
        run: cargo test --workspace --doc

  hardware-build:
    name: clippy + docs (hardware features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev libv4l-dev \
            libwayland-dev libxkbcommon-dev libdecor-0-dev \
            clang libclang-dev

      - name: Clippy (hardware backends)
        run: |
          cargo clippy -p openterface-core --features serial-backend,video-backend --lib -- -D warnings
          cargo clippy -p openterface-cli --features hardware --all-targets -- -D warnings
          cargo clippy -p openterface-gui --features display --all-targets -- -D warnings

      - name: Release-profile hardware build
        run: cargo build -p openterface-cli --release --locked --features hardware

      - name: Rustdoc (all features, warnings denied)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps

  scripts:
    name: shell scripts + packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: shellcheck + syntax
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # --severity=warning: info/style notes are advisory and vary by
          # shellcheck version across runners; warning+ still catches real bugs.
          shellcheck --severity=warning packaging/install.sh tools/kvm-debug.sh
          sh -n packaging/install.sh
          bash -n tools/kvm-debug.sh

      - name: udev rule presence + perms metadata
        run: |
          test -f packaging/udev/60-openterface.rules
          grep -q 'uaccess' packaging/udev/60-openterface.rules
          # No ACTIVE rule line may use world-writable MODE 0666 (comments may
          # mention it to explain why it is avoided).
          ! grep -Eq '^[^#]*MODE="0666"' packaging/udev/60-openterface.rules

      - name: crates.io metadata (package dry-run)
        run: |
          # openterface-core has no workspace deps, so a full publish dry-run
          # works standalone; the dependents are validated by `cargo package
          # --list` (metadata + included files) since their path deps are not yet
          # on the registry.
          cargo publish -p openterface-core --dry-run --allow-dirty
          for c in openterface-test-support openterface-gui openterface-cli; do
            cargo package -p "$c" --list --allow-dirty >/dev/null
          done

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  gpu-render:
    name: headless render (lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install software Vulkan + windowing libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers vulkan-tools libvulkan1 \
            libwayland-dev libxkbcommon-dev
      - name: Locate lavapipe ICD and verify it loads
        run: |
          set -x
          ls -la /usr/share/vulkan/icd.d/ || true
          dpkg -L mesa-vulkan-drivers | grep -iE 'icd|lvp|libvulkan_lvp' || true
          LVP="$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)"
          if [ -z "$LVP" ]; then
            echo "::error::No lavapipe ICD found under /usr/share/vulkan/icd.d/"
            exit 1
          fi
          echo "VK_ICD_FILENAMES=$LVP" >> "$GITHUB_ENV"
          # Diagnostic only: confirm the loader can see lavapipe.
          VK_ICD_FILENAMES="$LVP" vulkaninfo --summary 2>&1 | head -40 || true
      - name: Headless render test (software adapter)
        env:
          WGPU_BACKEND: vulkan
          OPENTERFACE_REQUIRE_GPU: "1"
        run: cargo test -p openterface-gui --features gpu-tests --test headless_render -- --nocapture
